<!DOCTYPE html>
<html>
<head>
	<title>Formulario flex</title>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="formulario_flex.css">
	<link rel="stylesheet" type="text/css" href="normalize.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src ="https://kit.fontawesome.com/62ea397d3a.js" crossorigin = "anonymous"></script>
</head>
	
<body>

	<div class="flex-container">
		<form class="form">
			<div class="form-section">
				<input type="text" class="form-input" placeholder="Asunto"> <!--placeholder let show a message to the input and textarea -->
			</div>

			<div class="form-section">
				<input type="email" class="form-input" placeholder="Email">
			</div>

			<div class="form-section">
				<textarea class="form-input" placeholder="Escribe tu mensaje"></textarea> 
			</div>

			<div class="form-section">
				<!--Buttom for send -->
				<input type="submit">
			</div>

			<div class="form-img">
				<img src="liinaliis.jpg">
			</div>

		</form>

	</div>

</body>

</html>
